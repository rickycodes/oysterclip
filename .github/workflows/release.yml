name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --all-features --workspace

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.event.inputs.tag }}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          git log $(git describe --tags --abbrev=0 2>/dev/null)..HEAD --oneline --pretty=format:"- %h: %s" > /tmp/release_notes.txt 2>/dev/null || echo "- Initial release" > /tmp/release_notes.txt
          cat /tmp/release_notes.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file /tmp/release_notes.txt \
            --draft=false

  build-binaries:
    name: Build ${{ matrix.binary }}
    needs: [verify, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        binary: ['oysterclip-viewer', 'oysterclip-tui', 'oysterclip-watcher']
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          cargo build --release --package ${{ matrix.binary }} --target x86_64-unknown-linux-gnu

      - name: Create artifact
        run: |
          mkdir -p release-artifacts
          cp target/x86_64-unknown-linux-gnu/release/${{ matrix.binary }} release-artifacts/
          cd release-artifacts
          tar czf ${{ matrix.binary }}-x86_64-unknown-linux-gnu.tar.gz ${{ matrix.binary }}
          cd ..

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "release-artifacts/${{ matrix.binary }}-x86_64-unknown-linux-gnu.tar.gz"
